<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Bebas+Neue&family=Inter:wght@500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    width: 1100px;
    background: #1a1a1a;
    color: #f0f0f0;
  }

  .cal {
    width: 1100px;
    position: relative;
    background: #222;
    padding: 0;
  }

  /* ═══ HEADER ═══════════════════════════════════════════ */
  .header {
    position: relative;
    height: 160px;
    background: #1a1a1a;
    overflow: hidden;
  }
  .header-art {
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 65%;
    background-position: right top;
    background-size: cover;
    mask-image: linear-gradient(90deg, transparent 0%, black 40%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 40%);
    opacity: 0.9;
  }
  .header-content {
    position: relative;
    z-index: 2;
    padding: 18px 22px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    height: 38px;
    filter: brightness(1.2);
  }
  .header-version {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid #555;
  }
  .header-bottom {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .header-title {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff;
  }
  .header-sub {
    font-size: 13px;
    font-weight: 700;
    color: #ccc;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .header-credits {
    position: absolute;
    top: 14px; right: 18px;
    z-index: 3;
    text-align: right;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .header-credits strong {
    display: block;
    font-size: 18px;
    color: #ff9f43;
    letter-spacing: 2px;
  }

  /* ═══ WEEKS BAR ════════════════════════════════════════ */
  .weeks-bar {
    display: flex;
    background: #2a2f38;
    border: 1px solid #444;
    border-radius: 6px;
    margin: 10px 14px;
    overflow: hidden;
  }
  .weeks-label {
    flex: 0 0 130px;
    padding: 10px 14px;
    border-right: 1px solid #444;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .weeks-label .wl-title {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .weeks-label .wl-sub {
    font-size: 10px;
    color: #999;
    font-weight: 600;
    text-transform: uppercase;
  }
  .weeks-cols {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(var(--wc, 6), 1fr);
  }
  .week-col {
    padding: 10px 12px;
    border-left: 1px solid #3a3f48;
  }
  .week-col:first-child { border-left: none; }
  .week-col .wc-num {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .week-col .wc-range {
    font-size: 11px;
    color: #aaa;
    font-weight: 600;
    margin-top: 2px;
  }

  /* ═══ SECTION PANEL ════════════════════════════════════ */
  .panel {
    margin: 8px 14px;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    border-radius: 8px;
    display: flex;
    overflow: hidden;
  }
  .panel-label {
    flex: 0 0 130px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-right: 1px solid #333;
  }
  .panel-label .pl-title {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .panel-content {
    flex: 1;
    padding: 12px;
    position: relative;
    min-width: 0;
  }

  /* ═══ BANNER CARDS - flowing agents ════════════════════ */
  .banner-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .banner-row {
    display: flex;
    gap: 10px;
  }
  .b-card {
    flex: 1;
    background: linear-gradient(160deg, #2c2c2e 0%, #18181a 100%);
    border: 1px solid #3a3a3a;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 175px;
    position: relative;
  }
  /* dramatic splash art behind, fading to dark */
  .b-card-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center 8%;
    opacity: 0.35;
    filter: contrast(1.1) saturate(1.2);
  }
  .b-card-overlay {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 120% 70% at 50% 100%, rgba(0,0,0,0.6) 0%, transparent 70%),
      linear-gradient(180deg, rgba(15,15,18,0.6) 0%, rgba(15,15,18,0.2) 40%, rgba(15,15,18,0.85) 100%);
  }
  .b-card-header {
    position: relative;
    z-index: 4;
    padding: 9px 12px 5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .b-card-name {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #fff;
    flex: 1;
    line-height: 1.1;
    text-shadow: 0 2px 4px rgba(0,0,0,0.95);
  }
  .b-card-dates {
    font-size: 10px;
    color: #ddd;
    font-weight: 600;
    background: rgba(0,0,0,0.65);
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.1);
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .b-card-dates::before { content: "📅 "; font-size: 9px; }

  /* AGENT ROW - free flowing, no rectangles */
  .b-agents {
    position: relative;
    z-index: 3;
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 0;
    padding: 0 4px;
    overflow: hidden;  /* only bottom edge cuts */
  }
  .b-agent {
    position: relative;
    flex: 1;
    height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }
  .b-agent.main {
    flex: 1.3;
    height: 145px;
  }
  .b-agent img {
    height: 105%;
    width: auto;
    max-width: none;
    object-fit: contain;
    object-position: center bottom;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.7))
            drop-shadow(0 0 1px rgba(0,0,0,0.5));
    margin-bottom: -2px;
  }
  .b-agent.main img {
    height: 110%;
  }
  .b-agent-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 38px;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.85) 70%);
    pointer-events: none;
  }
  .b-agent-name {
    position: relative;
    z-index: 2;
    font-size: 10px;
    font-weight: 700;
    color: #ddd;
    text-align: center;
    padding: 0 4px 5px;
    text-shadow: 0 1px 2px rgba(0,0,0,1);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
    letter-spacing: 0.3px;
  }
  .b-agent.main .b-agent-name {
    font-size: 11.5px;
    font-weight: 800;
    text-transform: uppercase;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .b-agent .rank-badge {
    position: absolute;
    bottom: 22px;
    right: 6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 900;
    z-index: 4;
    box-shadow: 0 2px 5px rgba(0,0,0,0.8), 0 0 0 2px rgba(0,0,0,0.5);
  }
  .b-agent .rank-badge.S {
    background: linear-gradient(135deg, #ffd35a, #ff8c42);
    color: #2a1500;
    text-shadow: 0 1px 0 rgba(255,230,150,0.5);
  }
  .b-agent .rank-badge.A {
    background: linear-gradient(135deg, #c984ff, #8a4aff);
    color: #fff;
  }

  /* ═══ W-ENGINE SHOWCASE ═════════════════════════════════ */
  .b-wengines {
    position: relative;
    z-index: 3;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 4px 16px 12px;
  }
  .b-we {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  /* Hexagonal backplate effect for main weapon */
  .b-we.main::before {
    content: "";
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 110px;
    background:
      radial-gradient(circle, rgba(255, 159, 67, 0.25) 0%, transparent 60%),
      conic-gradient(from 45deg,
        rgba(255, 159, 67, 0.4) 0%,
        rgba(255, 159, 67, 0.05) 25%,
        rgba(255, 159, 67, 0.4) 50%,
        rgba(255, 159, 67, 0.05) 75%,
        rgba(255, 159, 67, 0.4) 100%);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    z-index: -1;
    filter: blur(0.5px);
  }
  .b-we img {
    width: 80px;
    height: 80px;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.9))
            drop-shadow(0 0 6px rgba(0,0,0,0.6));
    background: transparent;
  }
  .b-we.main img {
    width: 102px;
    height: 102px;
    filter: drop-shadow(0 6px 16px rgba(255, 159, 67, 0.35))
            drop-shadow(0 4px 8px rgba(0,0,0,0.9));
  }
  .b-we-name {
    font-size: 9.5px;
    font-weight: 700;
    color: #aaa;
    text-align: center;
    max-width: 90px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    letter-spacing: 0.2px;
  }
  .b-we.main .b-we-name {
    font-size: 11.5px;
    font-weight: 800;
    color: #ffd35a;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }
  /* divider between main and side wengines */
  .b-we-divider {
    width: 1px;
    height: 70%;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.15), transparent);
    margin: 0 4px;
  }

  /* ═══ EVENT BARS ═══════════════════════════════════════ */
  .events-area {
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  /* Vertical week dividers */
  .events-area::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      90deg,
      transparent,
      transparent calc(100% / var(--wc, 6) - 1px),
      rgba(100,100,100,0.25) calc(100% / var(--wc, 6) - 1px),
      rgba(100,100,100,0.25) calc(100% / var(--wc, 6))
    );
    pointer-events: none;
    z-index: 1;
  }
  /* TODAY indicator */
  .today-line {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 2px;
    background: #ff4444;
    z-index: 10;
    box-shadow: 0 0 6px rgba(255, 68, 68, 0.6);
  }
  .today-line::before {
    content: "HOY";
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    font-weight: 700;
    color: #ff4444;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .ev-row { position: relative; height: 34px; }
  .ev-bar {
    position: absolute;
    top: 0;
    height: 34px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    z-index: 2;
    overflow: hidden;
  }
  .ev-bar.login {
    background: linear-gradient(90deg, #c8a050 0%, #a08030 100%);
    border: 1px solid #d4b060;
  }
  .ev-bar.permanent {
    background: linear-gradient(90deg, #4a6a4a 0%, #3a5a3a 100%);
    border: 1px solid #5a7a5a;
  }
  .ev-bar.bp {
    background: linear-gradient(90deg, #8a3050 0%, #6a2040 100%);
    border: 1px solid #aa4060;
  }
  .ev-bar.other {
    background: linear-gradient(90deg, #3a3a4a 0%, #2a2a3a 100%);
    border: 1px solid #5a5a6a;
  }

  .ev-name {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-dates {
    font-size: 10px;
    color: rgba(255,255,255,0.8);
    font-weight: 600;
    white-space: nowrap;
  }
  .ev-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
    overflow: hidden;
  }
  .new-badge {
    background: #e63946;
    color: white;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
    flex: 0 0 auto;
  }

  /* ═══ FOOTER ═══════════════════════════════════════════ */
  .footer {
    text-align: center;
    font-size: 9px;
    color: #666;
    padding: 10px 14px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-top: 1px solid #333;
    margin: 8px 14px 0;
  }
</style>
</head>
<body>
{{ body }}
</body>
</html>
